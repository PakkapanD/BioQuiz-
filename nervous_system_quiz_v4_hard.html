<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ควิซระบบประสาท (ยากมาก · ช้อยหลอก)</title>
<style>
  :root{
    --bg:#0f1b2d; --card:#182a44; --card2:#1f3454; --primary:#5cc8e6; --primary-d:#3aa9c9;
    --ok:#3ecf8e; --ok-bg:#123a2c; --no:#ff6b6b; --no-bg:#3a1a1c;
    --text:#e9f1fa; --muted:#9fb2c8; --line:#2a415f;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:"Sarabun","Segoe UI Historic","Tahoma","Segoe UI",system-ui,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px; margin:0 auto; padding:16px 14px 48px;}
  header{text-align:center; margin:10px 0 18px;}
  header h1{font-size:1.45rem; margin:0 0 4px; color:var(--primary);}
  header .badge{display:inline-block; background:#7a1f2b; color:#ffd9dc; font-size:.75rem; font-weight:700;
    padding:3px 12px; border-radius:99px; margin-top:4px;}
  header p{margin:6px 0 0; color:var(--muted); font-size:.9rem;}
  .card{background:var(--card); border-radius:16px; padding:20px 18px;
    box-shadow:0 8px 26px rgba(0,0,0,.35); border:1px solid var(--line);}
  .bar-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:.85rem; color:var(--muted);}
  .progress{height:8px; background:#0c1626; border-radius:99px; overflow:hidden; margin-bottom:18px;}
  .progress > i{display:block; height:100%; width:0; background:var(--primary); transition:width .3s;}
  .qnum{font-size:.8rem; color:var(--primary); font-weight:700;}
  .question{font-size:1.1rem; font-weight:600; margin:2px 0 16px;}
  .choices{display:flex; flex-direction:column; gap:10px;}
  .choice{display:flex; align-items:flex-start; gap:10px; width:100%; text-align:left;
    padding:13px 14px; border-radius:12px; cursor:pointer; background:var(--card2);
    border:2px solid var(--line); color:var(--text); font-size:1rem; font-family:inherit; transition:.15s;}
  .choice:hover:not(:disabled){border-color:var(--primary);}
  .choice .tag{flex:0 0 26px; height:26px; border-radius:50%; background:#26405f; color:var(--primary);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; margin-top:1px;}
  .choice:disabled{cursor:default;}
  .choice.correct{background:var(--ok-bg); border-color:var(--ok); color:#c9ffe6;}
  .choice.correct .tag{background:var(--ok); color:#05261a;}
  .choice.wrong{background:var(--no-bg); border-color:var(--no); color:#ffd6d6;}
  .choice.wrong .tag{background:var(--no); color:#3a0d0d;}
  .explain{margin-top:16px; padding:12px 14px; border-radius:12px; font-size:.93rem;
    background:#0e2033; border-left:4px solid var(--primary); display:none;}
  .explain.show{display:block;}
  .explain b{color:var(--primary);}
  .actions{margin-top:18px; display:flex; gap:10px;}
  .btn{flex:1; padding:13px; border:none; border-radius:12px; cursor:pointer; font-size:1.02rem;
    font-weight:700; font-family:inherit; color:#05261a; background:var(--primary); transition:.15s;}
  .btn:hover{background:var(--primary-d);}
  .btn:disabled{opacity:.35; cursor:default;}
  .result{text-align:center; display:none;}
  .result.show{display:block;}
  .score-big{font-size:3rem; font-weight:800; color:var(--primary); margin:6px 0;}
  .score-sub{color:var(--muted); margin-bottom:6px;}
  .medal{font-size:2.6rem;}
  .msg{font-size:1.05rem; margin:8px 0 20px; font-weight:600;}
  footer{text-align:center; margin-top:20px; color:var(--muted); font-size:.8rem;}
  #noJs{background:#7a1f2b; color:#ffd9dc; padding:14px; border-radius:12px; text-align:center; margin-bottom:16px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧠 ควิซระบบประสาท</h1>
    <div class="badge">ยากมาก · วิเคราะห์ · ช้อยหลอกเดายาก</div>
    <p>44 ข้อ · ทุกตัวเลือกยาวใกล้เคียงกัน</p>
  </header>

  <noscript>
    <div id="noJs">ต้องเปิดในเบราว์เซอร์ Safari/Chrome (บน iPad: กดค้างที่ไฟล์ → แชร์ → เปิดใน Safari — อย่าดูผ่านหน้าพรีวิว)</div>
  </noscript>

  <div class="card" id="quizCard">
    <div class="bar-row"><span id="counter">ข้อ 1 / 44</span><span id="scoreLive">คะแนน 0</span></div>
    <div class="progress"><i id="progFill"></i></div>
    <div class="qnum" id="qnum">คำถามที่ 1</div>
    <div class="question" id="qText">...</div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="actions"><button class="btn" id="nextBtn" disabled>ถัดไป →</button></div>
  </div>

  <div class="card result" id="resultCard">
    <div class="medal" id="medal">🎉</div>
    <div class="score-sub">คะแนนของคุณ</div>
    <div class="score-big"><span id="finalScore">0</span> / 44</div>
    <div class="msg" id="finalMsg"></div>
    <div class="actions"><button class="btn" id="restartBtn">เล่นใหม่อีกครั้ง</button></div>
  </div>

  <footer>สื่อการเรียน — ระบบประสาท (ระดับยากมาก)</footer>
</div>

<script>
/* ทุกช้อยเป็นประโยคเต็มยาวใกล้เคียงกัน คำตอบไม่ใช่ช้อยที่ยาวที่สุด ช้อยหลอกคือกลไกที่ผิดแต่ฟังดูสมเหตุสมผล */
const QUESTIONS = [
  {q:"K⁺ ให้ค่า E_K ≈ −102 mV แต่ resting potential จริงอยู่ที่ ≈ −70 mV ข้อใดอธิบายส่วนต่างนี้ได้ถูกต้อง", c:[
    "เยื่อในระยะพักมีการรั่วของ Na⁺ เข้าเซลล์อยู่บ้าง จึงดึงค่าให้บวกกว่า E_K",
    "โพแทสเซียมถูกปั๊มสูบออกจนความเข้มข้นภายในลดลง ค่าจึงต่ำกว่า E_K",
    "คลอไรด์เป็นไอออนหลักที่กำหนดศักย์พัก จึงทำให้ค่าต่างจาก E_K มาก",
    "โซเดียมปั๊มออกฤทธิ์ดันศักย์ให้เข้าใกล้ E_Na จนไปหยุดที่ราว −70"], a:0,
    e:"resting potential อยู่ใกล้ E_K แต่ไม่เท่า เพราะเยื่อยังมี permeability ต่อ Na⁺ (Na⁺ leak) ดึงค่าให้บวกขึ้น"},

  {q:"ถ้าเพิ่ม K⁺ นอกเซลล์จาก 5 เป็น 20 mM (ให้ค่าใกล้ภายในมากขึ้น) ศักย์เยื่อจะเปลี่ยนอย่างไร", c:[
    "เกิดดีโพลาไรซ์ เพราะเกรเดียนต์ที่ผลัก K⁺ ออกจากเซลล์ลดลง",
    "เกิดไฮเพอร์โพลาไรซ์ เพราะ K⁺ ไหลออกจากเซลล์ได้มากขึ้น",
    "ไม่เปลี่ยนแปลง เพราะโซเดียมปั๊มชดเชยความต่างได้ทันที",
    "พุ่งขึ้นเป็น +56 mV ทันที เพราะไปถึงค่า E_Na พอดี"], a:0,
    e:"K⁺ นอกสูงขึ้น → แรงดันให้ K⁺ ออกน้อยลง → เซลล์เป็นลบน้อยลง (depolarize) เหตุผลเดียวกับภาวะ hyperkalemia กระตุ้นเซลล์ผิดปกติ"},

  {q:"ในระยะ Falling phase (repolarization) ทิศไอออนที่ถูกต้องคือข้อใด", c:[
    "ช่อง Na⁺ เข้าสู่ภาวะ inactivate ขณะที่ช่อง K⁺ เปิดให้ K⁺ ไหลออก",
    "ช่อง Na⁺ ยังเปิดให้ Na⁺ ไหลเข้า พร้อมกับ K⁺ ที่ไหลเข้าเช่นกัน",
    "ทั้งช่อง Na⁺ และช่อง K⁺ เปิดพร้อมกัน ปล่อยให้ไอออนทั้งคู่ไหลออก",
    "ช่อง Na⁺ ปล่อย Na⁺ ออกจากเซลล์ ขณะที่ช่อง K⁺ ดึง K⁺ กลับเข้า"], a:0,
    e:"ช่วงลง: Na⁺ channel ส่วนใหญ่ inactivate หยุด Na⁺ เข้า ขณะ K⁺ ไหลออกทำให้ภายในกลับเป็นลบ"},

  {q:"เหตุใด action potential จึงเดินทางไปทิศเดียวไม่ย้อนกลับ", c:[
    "บริเวณที่เพิ่งเกิดสัญญาณอยู่ในระยะดื้อ ช่อง Na⁺ จึงยังกระตุ้นซ้ำไม่ได้",
    "ปลอกไมอีลินหุ้มอยู่เพียงด้านเดียวของแอกซอน สัญญาณจึงไปทางเดียว",
    "ค่า threshold ทางด้านหลังสูงกว่าด้านหน้าเสมอ สัญญาณจึงเดินหน้า",
    "โพแทสเซียมทางด้านหลังหมดไป จึงกระตุ้นย้อนกลับไม่ได้อีกต่อไป"], a:0,
    e:"บริเวณข้างหลังที่เพิ่งยิงยังอยู่ใน refractory period (Na⁺ channel inactivate) จึงกระตุ้นซ้ำไม่ได้"},

  {q:"AP เป็นแบบ all-or-none (ขนาดคงที่) ระบบประสาทเข้ารหัส 'ความแรงของสิ่งเร้า' ได้อย่างไร", c:[
    "เข้ารหัสด้วยความถี่การยิงสัญญาณและจำนวนหน่วยประสาทที่ถูกกระตุ้น",
    "เข้ารหัสด้วยขนาดของสัญญาณที่สูงขึ้นตามความแรงของสิ่งเร้า",
    "เข้ารหัสด้วยการเปลี่ยนทิศทางการนำสัญญาณให้ย้อนกลับได้",
    "เข้ารหัสด้วยการลดค่า threshold ของเซลล์ลงอย่างถาวร"], a:0,
    e:"ขนาด AP คงที่ จึงเข้ารหัสด้วยอัตราการยิง (frequency coding) และจำนวนหน่วยรับที่ทำงาน"},

  {q:"จาก R = ρL/A เหตุใดแอกซอนเส้นผ่านศูนย์กลางใหญ่จึงนำกระแสเร็วกว่า", c:[
    "พื้นที่ภาคตัดขวางมากทำให้ความต้านทานภายในต่ำ กระแสจึงไหลไปหน้าได้เร็ว",
    "พื้นที่ภาคตัดขวางมากทำให้ความต้านทานภายในสูง สัญญาณจึงเร่งเร็วขึ้น",
    "ค่าสภาพต้านทานจำเพาะลดลงเองตามขนาดของแอกซอนที่ใหญ่ขึ้น",
    "ความยาวของแอกซอนสั้นลงโดยอัตโนมัติเมื่อเส้นผ่านศูนย์กลางใหญ่"], a:0,
    e:"R แปรผกผันกับ A แอกซอนใหญ่มีความต้านทานต่ำ กระแส local circuit จึงไปได้ไกลและเร็ว"},

  {q:"ผู้ป่วยที่ปลอกไมอีลินถูกทำลาย (demyelination) จะนำกระแสผิดปกติเพราะเหตุใด", c:[
    "สูญเสียฉนวน ประจุรั่วระหว่าง node การนำกระแสแบบกระโดดจึงล้มเหลว",
    "node of Ranvier หายไปทั้งหมด ทำให้การนำกระแสประสาทเร็วขึ้น",
    "ช่อง Na⁺ เพิ่มจำนวนทั่วแอกซอน ทำให้ยิงสัญญาณถี่ผิดปกติ",
    "ค่า threshold ลดต่ำลงมาก จนเซลล์ยิงสัญญาณเองตลอดเวลา"], a:0,
    e:"ไมอีลินหายทำให้ประจุรั่วระหว่าง node การส่งแบบ saltatory เสียไป กระแสจึงช้าลง/ถูกบล็อก"},

  {q:"บทบาทของช่อง Ca²⁺ ที่ปลาย presynaptic เมื่อ AP มาถึงคือข้อใด", c:[
    "แคลเซียมที่ไหลเข้ากระตุ้นให้ถุงรวมกับเยื่อและหลั่งสารแบบเอกโซไซโทซิส",
    "แคลเซียมที่ไหลเข้าไปสร้างแอกชันโพเทนเชียลที่เซลล์หลังไซแนปส์",
    "แคลเซียมทำหน้าที่สลายแอซิทิลโคลีนที่ค้างอยู่ในช่องไซแนปส์",
    "แคลเซียมทำหน้าที่เป็นสารสื่อประสาทข้ามช่องไซแนปส์โดยตรง"], a:0,
    e:"AP เปิดช่อง Ca²⁺; Ca²⁺ ที่เข้ามาเป็นตัวกระตุ้นการหลั่งสารสื่อประสาท"},

  {q:"หากยับยั้งเอนไซม์ที่สลาย ACh ที่ช่องไซแนปส์ (เช่นสารในยาฆ่าแมลง) จะเกิดอะไร", c:[
    "แอซิทิลโคลีนคั่งค้าง กระตุ้นเซลล์หลังไซแนปส์ต่อเนื่องจนชักกระตุก",
    "แอซิทิลโคลีนถูกหลั่งน้อยลง ทำให้กล้ามเนื้อคลายตัวและสงบลง",
    "ค่า threshold ของเซลล์สูงขึ้น ทำให้การส่งสัญญาณช้าลงเรื่อย ๆ",
    "การดูดกลับสารสื่อประสาททดแทนได้หมด จึงไม่เกิดผลต่อกล้ามเนื้อ"], a:0,
    e:"AChE ถูกยับยั้ง → ACh ไม่ถูกสลาย → กระตุ้นซ้ำต่อเนื่อง → ชักกระตุก อาจเสียชีวิต"},

  {q:"Botulinum toxin กับ Nicotine ให้ผลต่อการหลั่งสารสื่อประสาทตรงข้ามกันอย่างไร", c:[
    "โบทูลินัมยับยั้งการหลั่ง ACh ส่วนนิโคตินกระตุ้นให้หลั่งสารสื่อมากขึ้น",
    "โบทูลินัมกระตุ้นการหลั่ง ACh ส่วนนิโคตินยับยั้งการหลั่งสารสื่อประสาท",
    "ทั้งสองยับยั้งการหลั่งสารสื่อประสาทเหมือนกัน ต่างที่ความแรงของฤทธิ์",
    "ทั้งสองกระตุ้นการหลั่งสารสื่อประสาทเหมือนกัน ต่างที่ตำแหน่งออกฤทธิ์"], a:0,
    e:"โบทูลินัมตัดการหลั่ง ACh; นิโคตินเป็นสารกระตุ้นให้หลั่งสารสื่อมากขึ้น"},

  {q:"เซลล์ postsynaptic ได้รับทั้ง EPSP และ IPSP พร้อมกัน จะเกิด AP หรือไม่ขึ้นกับสิ่งใด", c:[
    "ขึ้นกับผลรวมสุทธิของสัญญาณกระตุ้นและยับยั้งว่าถึงระดับ threshold หรือไม่",
    "ขึ้นกับจำนวนไซแนปส์ทั้งหมดที่เชื่อมต่อกับเซลล์นั้นเพียงอย่างเดียว",
    "ขึ้นกับชนิดของเยื่อไมอีลินที่หุ้มแอกซอนของเซลล์ประสาทนั้น",
    "ขึ้นกับความยาวของเดนไดรต์ที่ทำหน้าที่รับสัญญาณเข้าเท่านั้น"], a:0,
    e:"synaptic integration = ผลบวกเชิงพื้นที่/เวลาของ EPSP กับ IPSP ถ้าสุทธิถึง threshold จึงยิง AP"},

  {q:"ข้อใดคือความแตกต่างเชิงหน้าที่ที่สำคัญที่สุดของไซแนปส์ไฟฟ้ากับไซแนปส์เคมี", c:[
    "ไซแนปส์ไฟฟ้าส่งเร็วและมักสองทิศ ส่วนไซแนปส์เคมีมีดีเลย์และปกติทางเดียว",
    "ไซแนปส์ไฟฟ้าใช้สารสื่อประสาทมากกว่าไซแนปส์เคมีหลายเท่าตัว",
    "ไซแนปส์เคมีส่งสัญญาณได้เร็วกว่าไซแนปส์ไฟฟ้าในทุกกรณีเสมอ",
    "ไซแนปส์ไฟฟ้าพบเฉพาะในสัตว์เลี้ยงลูกด้วยนมชั้นสูงเท่านั้น"], a:0,
    e:"gap junction ให้ไอออนไหลตรงเร็วและสองทิศ; chemical มี synaptic delay แต่ปรับ/ขยายสัญญาณได้"},

  {q:"เหตุใดรีเฟล็กซ์แบบ polysynaptic จึงใช้เวลามากกว่าแบบ monosynaptic", c:[
    "เพราะมีอินเทอร์นิวรอนแทรกเพิ่ม ทำให้มีจำนวนไซแนปส์ที่ต้องผ่านมากกว่า",
    "เพราะมันข้ามตัวเซลล์รับความรู้สึกไปตรงยังเซลล์สั่งการเลย จึงช้ากว่า",
    "เพราะสัญญาณของแบบไซแนปส์เดียวต้องเดินทางขึ้นไปแปลผลที่สมองก่อน",
    "เพราะทั้งสองแบบผ่านไขสันหลังเหมือนกัน จึงใช้เวลาเท่ากันทุกครั้ง"], a:0,

let order=[], idx=0, score=0, answered=false;
const $=id=>document.getElementById(id);
const total=QUESTIONS.length;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(){order=shuffle([...Array(total).keys()]); idx=0; score=0; answered=false;
  $("quizCard").style.display="block"; $("resultCard").classList.remove("show"); render();}
function render(){
  answered=false;
  const q=QUESTIONS[order[idx]];
  $("counter").textContent=`ข้อ ${idx+1} / ${total}`;
  $("scoreLive").textContent=`คะแนน ${score}`;
  $("progFill").style.width=`${(idx/total)*100}%`;
  $("qnum").textContent=`คำถามที่ ${idx+1}`;
  $("qText").textContent=q.q;
  const opts=q.c.map((t,i)=>({t,correct:i===q.a})); shuffle(opts);
  const box=$("choices"); box.innerHTML="";
  const L=["ก","ข","ค","ง"];
  opts.forEach((o,i)=>{const b=document.createElement("button"); b.className="choice";
    b.innerHTML=`<span class="tag">${L[i]}</span><span>${o.t}</span>`;
    b.onclick=()=>pick(b,o.correct,box); box.appendChild(b);});
  const ex=$("explain"); ex.classList.remove("show"); ex.innerHTML="";
  $("nextBtn").disabled=true;
  $("nextBtn").textContent=(idx===total-1)?"ดูผลคะแนน 🏁":"ถัดไป →";
}
function pick(btn,ok,box){
  if(answered)return; answered=true;
  const kids=box.children;
  for(let i=0;i<kids.length;i++)kids[i].disabled=true;
  const correctText=QUESTIONS[order[idx]].c[QUESTIONS[order[idx]].a];
  if(ok){btn.classList.add("correct"); score++;}
  else{btn.classList.add("wrong");
    for(let i=0;i<kids.length;i++){
      if(kids[i].querySelector("span:last-child").textContent===correctText)kids[i].classList.add("correct");}}
  $("scoreLive").textContent=`คะแนน ${score}`;
  const q=QUESTIONS[order[idx]];
  if(q.e){const ex=$("explain"); ex.innerHTML=`<b>💡 เหตุผล:</b> ${q.e}`; ex.classList.add("show");}
  $("nextBtn").disabled=false;
}
$("nextBtn").onclick=function(){if(!answered)return; if(idx<total-1){idx++; render();} else finish();};
function finish(){
  $("quizCard").style.display="none";
  const pct=Math.round((score/total)*100);
  $("finalScore").textContent=score;
  let medal="🎯",msg="";
  if(pct>=90){medal="🏆";msg="สุดยอด! ไม่โดนช้อยหลอกและวิเคราะห์แม่นมาก";}
  else if(pct>=75){medal="🌟";msg="เก่งมาก แยกกลไกที่ถูกออกจากช้อยหลอกได้ดี";}
  else if(pct>=50){medal="👍";msg="ผ่านครึ่ง ทบทวนกลไกจุดที่โดนหลอกอีกนิด";}
  else{medal="📚";msg="ชุดนี้ยากจริง ลองไล่เหตุผลเชิงกลไกแล้วมาใหม่";}
  $("medal").textContent=medal;
  $("finalMsg").textContent=`${msg} (${pct}%)`;
  $("resultCard").classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
}
$("restartBtn").onclick=start;
start();
</script>
